name: Create new release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go 1.26.x
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o "opencast-meet-${{ github.ref_name }}.linux-x86_64"

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -o "opencast-meet-${{ github.ref_name }}.linux-arm64"

      - run: file opencast-meet*

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: opencast-meet*
          fail_on_unmatched_files: true
          generate_release_notes: true
