name: Go build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        go-version:
          - "1.25.x"
          - "1.26.x"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
