<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opencast Meet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:         #1d3557;
      --card-bg:      #ffffff;
      --green:        #4caf82;
      --green-hover:  #3d9970;
      --text:         #1d3557;
      --text-muted:   #5a7a9a;
      --input-bg:     #f4f7fa;
      --input-border: #c8d8e8;
      --error-bg:     #fff0f0;
      --error-border: #e88;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(10, 20, 40, 0.65), rgba(10, 20, 40, 0.65)),
        url("/static/img/background.jpg") center/cover no-repeat fixed;
      color: var(--text);
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 2.5rem 2.75rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    .logo {
      display: block;
      width: 200px;
      margin: 0 auto 2rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 400;
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      color: #c0392b;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--green);
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #aabccc;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--green);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover {
      background: var(--green-hover);
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/img/logo.png" alt="Opencast">
    <h1>Join Meeting</h1>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    <form method="POST" action="/join">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
      <button type="submit">Join</button>
    </form>
  </div>
</body>
</html>
